services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: fireducks_azurite
    restart: always
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data

  postgres:
    image: postgres:15-alpine
    container_name: fireducks_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 435762198Ok
      POSTGRES_DB: fireducks_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  azurite_data:
  postgres_data: